<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formavo</title>
<meta name="description" content="Get fit around your busy schedules. Download Formavo on the App Store or Google Play.">
<meta name="robots" content="noindex">
<style>
  :root {
    --charcoal: #1A1E23;
    --offwhite: #F2F1EC;
    --lime: #C8F442;
    --muted: #8A9099;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--charcoal);
    color: var(--offwhite);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card { width: 100%; max-width: 400px; text-align: center; }
  .mark {
    width: 84px; height: 84px; border-radius: 20px;
    background: var(--lime);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .mark svg { width: 46px; height: 46px; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: 0.2px; margin: 0 0 10px; }
  .tagline { font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0 0 32px; }
  .badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .badges a { display: inline-flex; align-items: center; }
  .badges a:focus-visible { outline: 2px solid var(--lime); outline-offset: 4px; border-radius: 6px; }
  .badge-apple { height: 44px; width: auto; display: block; }
  .badge-google { height: 66px; width: auto; display: block; margin: -11px 0; }
  .foot { margin-top: 32px; font-size: 13px; }
  .foot a { color: var(--muted); text-decoration: none; }
  .foot a:hover { color: var(--offwhite); }
</style>
</head>
<body>
<main class="card">
  <div class="mark" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="#1A1E23">
      <rect x="1" y="9" width="2.5" height="6" rx="1.2"/>
      <rect x="4.5" y="6.5" width="3" height="11" rx="1.5"/>
      <rect x="8.5" y="10.6" width="7" height="2.8"/>
      <rect x="16.5" y="6.5" width="3" height="11" rx="1.5"/>
      <rect x="20.5" y="9" width="2.5" height="6" rx="1.2"/>
    </svg>
  </div>
  <h1>Formavo</h1>
  <p class="tagline">Get fit around your busy schedules</p>
  <div class="badges">
    <a href="https://apps.apple.com/gb/app/formavo/id6791264741">
      <img class="badge-apple" src="badge-app-store.svg" alt="Download Formavo on the App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=com.seyihq.formavo.twa">
      <img class="badge-google" src="badge-google-play.png" alt="Get Formavo on Google Play">
    </a>
  </div>
  <p class="foot"><a href="https://www.seyihq.com">seyiHQ</a></p>
</main>
</body>
</html>
