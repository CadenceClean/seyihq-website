<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Formavo</title>
<meta name="description" content="Download Formavo for iPhone and Android.">
<meta name="robots" content="noindex">
<style>
  :root {
    --charcoal: #1A1E23;
    --offwhite: #F2F1EC;
    --lime: #C8F442;
    --muted: #8A9099;
    --line: #2C3138;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--charcoal);
    color: var(--offwhite);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card { width: 100%; max-width: 380px; text-align: center; }
  .mark {
    width: 84px; height: 84px; border-radius: 20px;
    background: var(--lime);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .mark svg { width: 46px; height: 46px; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: 0.2px; margin: 0 0 8px; }
  .sub { font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0 0 32px; }
  .btn {
    display: block; width: 100%;
    padding: 15px 20px; margin-bottom: 12px;
    border-radius: 12px;
    font-size: 16px; font-weight: 600;
    text-decoration: none;
    transition: transform 0.15s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--lime); color: var(--charcoal); }
  .btn.secondary { background: transparent; color: var(--offwhite); border: 1px solid var(--line); }
  .btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 3px; }
  .foot { margin-top: 28px; font-size: 13px; }
  .foot a { color: var(--muted); text-decoration: none; }
  .foot a:hover { color: var(--offwhite); }
  @media (prefers-reduced-motion: reduce) { .btn { transition: none; } }
</style>
</head>
<body>
<main class="card">
  <div class="mark" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="#1A1E23">
      <rect x="1" y="9" width="2.5" height="6" rx="1.2"/>
      <rect x="4.5" y="6.5" width="3" height="11" rx="1.5"/>
      <rect x="8.5" y="10.6" width="7" height="2.8"/>
      <rect x="16.5" y="6.5" width="3" height="11" rx="1.5"/>
      <rect x="20.5" y="9" width="2.5" height="6" rx="1.2"/>
    </svg>
  </div>
  <h1>Get Formavo</h1>
  <p class="sub" id="status">Available on iPhone and Android.</p>
  <a class="btn primary" id="ios" href="https://apps.apple.com/gb/app/formavo/id6791264741">Download on the App Store</a>
  <a class="btn secondary" id="android" href="https://play.google.com/store/apps/details?id=com.seyihq.formavo.twa">Get it on Google Play</a>
  <p class="foot"><a href="https://www.seyihq.com">seyiHQ</a></p>
</main>
<script>
(function () {
  var ua = navigator.userAgent || "";
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/i.test(ua);
  var ios = document.getElementById("ios");
  var android = document.getElementById("android");
  var status = document.getElementById("status");

  if (isIOS) {
    android.style.display = "none";
    status.textContent = "Available on the App Store.";
  } else if (isAndroid) {
    ios.style.display = "none";
    android.className = "btn primary";
    status.textContent = "Available on Google Play.";
  }
})();
</script>
</body>
</html>
