<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Realivo</title>
<meta name="description" content="Prove every clean. Download Realivo on Google Play.">
<meta name="robots" content="noindex">
<style>
  :root {
    --charcoal: #1A1E23;
    --offwhite: #F2F1EC;
    --muted: #8A9099;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--charcoal);
    color: var(--offwhite);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card { width: 100%; max-width: 400px; text-align: center; }
  .mark { width: 84px; height: 84px; margin: 0 auto 24px; display: block; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: 0.2px; margin: 0 0 10px; }
  .tagline { font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0 0 32px; }
  .badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .badges a { display: inline-flex; align-items: center; }
  .badges a:focus-visible { outline: 2px solid var(--offwhite); outline-offset: 4px; border-radius: 6px; }
  .badge-apple { height: 44px; width: auto; display: block; }
  .badge-google { height: 66px; width: auto; display: block; margin: -11px 0; }
  .foot { margin-top: 32px; font-size: 13px; }
  .foot a { color: var(--muted); text-decoration: none; }
  .foot a:hover { color: var(--offwhite); }
</style>
</head>
<body>
<main class="card">
  <svg class="mark" viewBox="0 0 512 512" aria-hidden="true">
    <rect width="512" height="512" rx="106" fill="#1F3A5F"/>
    <path d="M128 272 L207 359 L372 183" fill="none" stroke="#FFFFFF" stroke-width="50" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M360 128 C374 161 374 161 407 175 C374 189 374 189 360 222 C346 189 346 189 313 175 C346 161 346 161 360 128 Z" fill="#2E8B8B"/>
  </svg>
  <h1>Realivo</h1>
  <p class="tagline">Prove every clean</p>
  <div class="badges">
    <!-- APP STORE BADGE: switch this on when Apple approves Realivo.
         Replace APPLE_APP_ID_HERE with the numeric App ID from App Store Connect,
         then delete this comment wrapper so the link goes live.
    <a href="https://apps.apple.com/gb/app/realivo/idAPPLE_APP_ID_HERE">
      <img class="badge-apple" src="/realivo/badge-app-store.svg" alt="Download Realivo on the App Store">
    </a>
    -->
    <a href="https://play.google.com/store/apps/details?id=com.seyihq.realivo">
      <img class="badge-google" src="/realivo/badge-google-play.png" alt="Get Realivo on Google Play">
    </a>
  </div>
  <p class="foot"><a href="https://www.seyihq.com">seyiHQ</a></p>
</main>
</body>
</html>
